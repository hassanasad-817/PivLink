[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
pivlink = "2uM7hfyYjXFZA4m5t9KoNpcas2gKxLHDSs3NwCy3uMES"

[programs.mainnet]
pivlink = "2D5ngxXpkfVUPzz8bRgYoFKUvFqrxnZkbeigjuDgopmY"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
